<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAWP TAF Guidance - Meteologix</title>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #10b981;
            --accent-hover: #059669;
            --border: #334155;
        }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 20px;
        }

        h1 { margin: 0; font-size: 1.5rem; font-weight: 600; }
        .subtitle { color: var(--text-muted); font-size: 0.9rem; margin-top: 5px; }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        .panel-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 15px;
            color: var(--accent);
        }

        #chart-temp, #chart-wind, #chart-rain {
            min-height: 300px;
        }
        
        .table-container {
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        
        th, td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }
        
        th { color: var(--text-muted); font-weight: 500; }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <h1>WAWP Aviation Guidance</h1>
            <div class="subtitle" id="update-time">Loading...</div>
        </div>
        <div>
            <span style="background: var(--accent); color: white; padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: 600;">v200 Meteologix</span>
        </div>
    </div>

    <div class="dashboard-grid">
        <div class="panel">
            <h2 class="panel-title">Meteogram (Consensus)</h2>
            <div id="chart-temp"></div>
            <div id="chart-wind"></div>
            <div id="chart-rain"></div>
        </div>
        
        <div class="panel">
            <h2 class="panel-title">Tabular Data</h2>
            <div class="table-container">
                <table id="data-table">
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>Temp (°C)</th>
                            <th>Dew (°C)</th>
                            <th>RH (%)</th>
                            <th>Wind (kt)</th>
                            <th>Gust (kt)</th>
                            <th>Rain (mm)</th>
                            <th>Condition</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Data will be populated here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        async function loadData() {
            try {
                const response = await fetch('data/taf_guidance.json');
                const result = await response.json();
                
                document.getElementById('update-time').innerText = `Generated: ${result.metadata.generated_at} UTC`;
                
                const data = result.data;
                const times = data.map(d => d.Hours + ":00");
                const temps = data.map(d => d.Temperature);
                const dews = data.map(d => d.Dewpoint);
                const winds = data.map(d => d.Wind);
                const gusts = data.map(d => d.Gust);
                const rains = data.map(d => d.Rain);
                
                // Temperature Chart
                new ApexCharts(document.querySelector("#chart-temp"), {
                    series: [{ name: 'Temperature', data: temps }, { name: 'Dewpoint', data: dews }],
                    chart: { type: 'line', height: 250, toolbar: { show: false }, foreColor: '#94a3b8' },
                    stroke: { curve: 'smooth', width: 2 },
                    colors: ['#ef4444', '#3b82f6'],
                    xaxis: { categories: times, tooltip: { enabled: false } },
                    yaxis: { title: { text: '°C' } },
                    grid: { borderColor: '#334155' },
                    title: { text: 'Temperature & Dewpoint', style: { color: '#f8fafc' } }
                }).render();

                // Wind Chart
                new ApexCharts(document.querySelector("#chart-wind"), {
                    series: [{ name: 'Gust', data: gusts }, { name: 'Wind Speed', data: winds }],
                    chart: { type: 'area', height: 200, toolbar: { show: false }, foreColor: '#94a3b8' },
                    stroke: { curve: 'smooth', width: 2 },
                    fill: { type: 'gradient', gradient: { shadeIntensity: 1, opacityFrom: 0.7, opacityTo: 0.1 } },
                    colors: ['#f59e0b', '#10b981'],
                    xaxis: { categories: times, tooltip: { enabled: false } },
                    yaxis: { title: { text: 'Knots' }, min: 0 },
                    grid: { borderColor: '#334155' },
                    dataLabels: { enabled: false },
                    title: { text: 'Wind & Gusts', style: { color: '#f8fafc' } }
                }).render();

                // Rain Chart
                new ApexCharts(document.querySelector("#chart-rain"), {
                    series: [{ name: 'Rainfall', data: rains }],
                    chart: { type: 'bar', height: 200, toolbar: { show: false }, foreColor: '#94a3b8' },
                    plotOptions: { bar: { borderRadius: 2, columnWidth: '60%' } },
                    colors: ['#0ea5e9'],
                    xaxis: { categories: times, tooltip: { enabled: false } },
                    yaxis: { title: { text: 'mm' }, min: 0 },
                    grid: { borderColor: '#334155' },
                    dataLabels: { enabled: false },
                    title: { text: 'Precipitation', style: { color: '#f8fafc' } }
                }).render();
                
                // Populate Table
                const tbody = document.querySelector("#data-table tbody");
                data.forEach(d => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${d.Datetime.substring(11, 16)}</td>
                        <td style="color: #ef4444">${d.Temperature}</td>
                        <td style="color: #3b82f6">${d.Dewpoint}</td>
                        <td>${d.Humidity}</td>
                        <td style="color: #10b981">${d.Wind}</td>
                        <td style="color: #f59e0b">${d.Gust}</td>
                        <td style="color: #0ea5e9">${d.Rain}</td>
                        <td>${d.Condition || '-'}</td>
                    `;
                    tbody.appendChild(tr);
                });
                
            } catch (error) {
                console.error("Error loading data:", error);
                document.getElementById('update-time').innerText = "Failed to load data. Is the pipeline running?";
            }
        }
        
        loadData();
    </script>
</body>
</html>
