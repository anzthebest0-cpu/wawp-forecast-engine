name: WAWP Meteologix Engine

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '30 0 * * *'  # 00:30 UTC -> 08:30 WITA
    - cron: '30 6 * * *'  # 06:30 UTC -> 14:30 WITA
    - cron: '30 12 * * *' # 12:30 UTC -> 20:30 WITA
    - cron: '30 18 * * *' # 18:30 UTC -> 02:30 WITA
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          # Use apt-get for linux dependencies (Chrome for Selenium)
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          pip install -r requirements.txt

      - name: Download Database from Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download latest-db -n wawp_forecasts.db || echo "Release not found, starting fresh or using local db"

      - name: Run Pipeline
        run: python run_pipeline.py

      - name: Commit and Push Dashboard Data
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add docs/data/
          git stash push -m "runner-data"
          git pull --rebase origin main
          git stash pop || true
          if [ -n "$(git diff --name-only --diff-filter=U -- docs/data/)" ]; then
            echo "Resolving generated-data conflicts with runner output"
            git checkout --theirs -- docs/data/ || true
            git stash drop || true
          fi
          git add docs/data/
          if git diff --cached --quiet; then
            echo "No generated data changes to commit"
          else
            git commit -m "chore: auto-update dashboard data"
            git push
          fi

      - name: Upload Database to Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload latest-db wawp_forecasts.db --clobber

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

  deploy-pages:
    needs: run-pipeline
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
