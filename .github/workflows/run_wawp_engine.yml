name: WAWP Meteologix Engine

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '30 0 * * *'  # 00:30 UTC -> 08:30 WITA
    - cron: '30 6 * * *'  # 06:30 UTC -> 14:30 WITA
    - cron: '30 12 * * *' # 12:30 UTC -> 20:30 WITA
    - cron: '30 18 * * *' # 18:30 UTC -> 02:30 WITA
  workflow_dispatch:
    inputs:
      compact_db_audit:
        description: 'Build and validate a compact database candidate without changing the rolling release asset'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pages: write
  id-token: write

# The rolling release asset is a shared mutable archive. Never let two runners
# download the same copy and race to replace it.
concurrency:
  group: wawp-engine-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          # Use apt-get for linux dependencies (Chrome for Selenium)
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          pip install -r requirements.txt

      - name: Download Database from Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view latest-db > /dev/null 2>&1; then
            asset_name="$(gh release view latest-db --json assets --jq '[.assets[] | select(.name | test("^wawp_forecasts(?:-[0-9]+-[0-9]+)?\\.db$"))] | sort_by(.updatedAt) | last | .name // empty')"
            if [ -z "$asset_name" ]; then
              echo "Rolling release latest-db exists but contains no recoverable forecast database asset."
              echo "Restore a verified local database to the release before running the pipeline again."
              exit 1
            fi
            echo "Restoring rolling forecast database from release"
            gh release download latest-db --pattern "$asset_name" --dir . --clobber
            if [ "$asset_name" != "wawp_forecasts.db" ]; then
              mv "$asset_name" wawp_forecasts.db
            fi
            test -s wawp_forecasts.db
            python -c "import sqlite3, sys; db = sqlite3.connect('wawp_forecasts.db'); result = db.execute('PRAGMA integrity_check').fetchone()[0]; db.close(); print('SQLite integrity:', result); sys.exit(0 if result == 'ok' else 1)"
            echo "RESTORED_DB_ASSET=$asset_name" >> "$GITHUB_ENV"
          else
            echo "No rolling database release exists; creating the one-time bootstrap release"
            gh release create latest-db --title "Latest Forecast Database" --notes "Rolling database archive created by the WAWP pipeline."
            echo "RESTORED_DB_ASSET=" >> "$GITHUB_ENV"
          fi

      - name: Run Pipeline
        run: python run_pipeline.py

      # This is deliberately manual and audit-only. It creates a candidate from
      # the freshly updated database, but the existing release asset is still
      # uploaded below. A separate reviewed change is required for promotion.
      - name: Audit Compact Database Candidate
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.compact_db_audit }}
        run: |
          set -euo pipefail
          candidate_dir="artifacts/operational"
          candidate_db="$candidate_dir/wawp_operational_candidate.db"
          mkdir -p "$candidate_dir/dashboard_smoke"
          python src/build_compact_operational_db.py \
            --source wawp_forecasts.db \
            --output "$candidate_db"
          python - <<'PY'
          import sqlite3
          from pathlib import Path
          from types import SimpleNamespace

          from src.export_dashboard_data import export_all

          candidate = Path("artifacts/operational/wawp_operational_candidate.db")
          output_dir = Path("artifacts/operational/dashboard_smoke")
          conn = sqlite3.connect(candidate)
          try:
              export_all(SimpleNamespace(conn=conn), str(output_dir))
          finally:
              conn.close()
          required = {"db_health.json", "latest_weights.json", "tafor_intel.json", "taf_guidance.json"}
          missing = sorted(name for name in required if not (output_dir / name).exists())
          if missing:
              raise SystemExit(f"Compact-candidate export is missing: {missing}")
          print("Compact candidate dashboard export smoke test passed")
          PY
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("artifacts/operational/wawp_operational_candidate.db.report.json").read_text())
          if not report.get("valid"):
              raise SystemExit("Compact database candidate did not pass validation")
          print("COMPACTION_AUDIT=passed")
          print("SOURCE_BYTES=", report["source_size_bytes"])
          print("CANDIDATE_BYTES=", report["candidate_size_bytes"])
          print("RAW_MINUTE_ROWS=", report["raw_minute_source_rows"], "->", report["raw_minute_candidate_rows"])
          PY

      - name: Upload Compact Database Audit Report
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.compact_db_audit }}
        uses: actions/upload-artifact@v4
        with:
          name: compact-db-audit-${{ github.run_id }}
          path: |
            artifacts/operational/*.report.json
            artifacts/operational/dashboard_smoke/
          retention-days: 7
          if-no-files-found: error

      - name: Validate and Upload Database to Release
        timeout-minutes: 45
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          test -s wawp_forecasts.db
          python -c "import sqlite3, sys; db = sqlite3.connect('wawp_forecasts.db'); result = db.execute('PRAGMA integrity_check').fetchone()[0]; db.close(); print('SQLite integrity:', result); sys.exit(0 if result == 'ok' else 1)"
          asset_name="wawp_forecasts-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}.db"
          cp wawp_forecasts.db "$asset_name"
          gh release upload latest-db "$asset_name"
          if [ -n "${RESTORED_DB_ASSET:-}" ] && [ "$RESTORED_DB_ASSET" != "$asset_name" ]; then
            gh release delete-asset latest-db "$RESTORED_DB_ASSET" --yes || echo "Could not remove prior database asset; it remains as a fallback."
          fi

      - name: Commit and Push Dashboard Data
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add docs/data/
          git stash push -m "runner-data"
          git pull --rebase origin main
          git stash pop || true
          if [ -n "$(git diff --name-only --diff-filter=U -- docs/data/)" ]; then
            echo "Resolving generated-data conflicts with runner output"
            git checkout --theirs -- docs/data/ || true
            git stash drop || true
          fi
          git add docs/data/
          if git diff --cached --quiet; then
            echo "No generated data changes to commit"
          else
            git commit -m "chore: auto-update dashboard data"
            git push
          fi

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

  deploy-pages:
    needs: run-pipeline
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
